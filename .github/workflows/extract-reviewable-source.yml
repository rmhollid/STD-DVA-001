name: Extract reviewable source

on:
  push:
    branches:
      - reviewable-source-v0.2.6
  workflow_dispatch:

permissions:
  contents: write

jobs:
  extract:
    if: ${{ !contains(github.event.head_commit.message, '[source-extract]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: reviewable-source-v0.2.6
          fetch-depth: 0
      - name: Verify release archive
        run: sha256sum -c STD-DVA-001_v0.2.6.tar.gz.sha256
      - name: Extract source tree
        run: |
          work="$(mktemp -d)"
          tar -xzf STD-DVA-001_v0.2.6.tar.gz -C "$work"
          cp -a "$work/STD-DVA-001/." .
          rm -rf "$work"
      - name: Commit exact source contents
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add LICENSE NOTICE fixtures manifest prg "read me.txt" spl std tests
          if git diff --cached --quiet; then
            echo "Source tree already matches the archive."
            exit 0
          fi
          git commit -m "Expose v0.2.6 source tree [source-extract]"
          git push origin HEAD:reviewable-source-v0.2.6
